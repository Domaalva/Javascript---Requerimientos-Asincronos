<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Reporte de Ventas de Café</title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-100 min-h-screen">

    <div class="max-w-6xl mx-auto p-6">

        <h1 class="text-4xl font-bold text-center text-amber-700 mb-2">
            ☕Reporte de Ventas de Café☕
        </h1>

        <p class="text-center text-gray-600 mb-8">
            Consulta dinámica de ventas obtenidas mediante requerimientos asíncronos XML.
        </p>

        <div class="bg-white shadow-lg rounded-xl p-6">

            <h2 class="text-2xl font-bold mb-6">
                202207257 - Domenika Arboleda
            </h2>

            <table id="salesTable"
                class="w-full border-collapse border border-amber-700">

                <thead>
                    <tr class="bg-amber-700 text-white">
                        <th class="py-3 px-4 text-left">Fecha</th>
                        <th class="py-3 px-4 text-left">Producto</th>
                        <th class="py-3 px-4 text-left">Cantidad</th>
                        <th class="py-3 px-4 text-left">Total</th>
                    </tr>
                </thead>

                <tbody>

                </tbody>

            </table>

        </div>

    </div>
    <script src="https://cdn.datatables.net/2.0.8/js/dataTables.js"></script>
    <script src="js/requirements.js"></script>
    <script src="js/index.js"></script>
</body>

</html>
